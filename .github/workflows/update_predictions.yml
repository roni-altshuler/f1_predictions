name: Update Race Predictions

on:
  # Scheduled: runs every Saturday at 23:00 UTC (after qualifying worldwide)
  schedule:
    - cron: "0 23 * * 6"
  workflow_dispatch:
    inputs:
      round:
        description: "Round number (1-24), or 'next' for upcoming round, or 'all'"
        required: true
        default: "next"
      fastf1:
        description: "Generate FastF1 historical visualizations"
        type: boolean
        default: true
      advanced:
        description: "Run advanced models (pit strategy, tyre deg, LSTM)"
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine round number
        id: round
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.round }}" = "next" ]; then
            # Find the next upcoming round based on current date
            ROUND=$(python3 -c "
          import json, os, sys
          from datetime import datetime, timedelta
          sys.path.insert(0, '.')
          from f1_prediction_utils import CALENDAR_2026
          now = datetime.utcnow()
          # Find nearest race within ±3 days (covers the race weekend)
          for rnd, info in sorted(CALENDAR_2026.items()):
              race_date = datetime.strptime(info['date'], '%Y-%m-%d')
              if abs((race_date - now).days) <= 3:
                  print(rnd)
                  sys.exit(0)
          # Fallback: next future race
          for rnd, info in sorted(CALENDAR_2026.items()):
              race_date = datetime.strptime(info['date'], '%Y-%m-%d')
              if race_date >= now:
                  print(rnd)
                  sys.exit(0)
          print(1)
          ")
            echo "round=$ROUND" >> "$GITHUB_OUTPUT"
            echo "Detected upcoming round: $ROUND"
          else
            echo "round=${{ github.event.inputs.round }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run prediction pipeline
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          FLAGS=""
          if [ "${{ github.event.inputs.fastf1 }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="$FLAGS --fastf1"
          fi
          if [ "${{ github.event.inputs.advanced }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="$FLAGS --advanced"
          fi

          if [ "$ROUND" = "all" ]; then
            python export_website_data.py --all $FLAGS
          else
            python export_website_data.py --round "$ROUND" $FLAGS
          fi

      - name: Commit prediction data & visualizations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/data/ website/public/visualizations/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            ROUND="${{ steps.round.outputs.round }}"
            if [ "$ROUND" = "all" ]; then
              git commit -m "Update predictions for all rounds"
            else
              git commit -m "Update predictions for round $ROUND ($(date -u +%Y-%m-%d))"
            fi
            git push
          fi

  deploy:
    needs: predict
    uses: ./.github/workflows/deploy.yml
