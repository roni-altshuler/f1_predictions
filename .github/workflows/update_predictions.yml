name: Update Race Predictions

on:
  schedule:
    # Three cron jobs covering the entire GP weekend:
    - cron: "0 18 * * 5"   # Friday  18:00 UTC – pre-weekend predictions
    - cron: "0 23 * * 6"   # Saturday 23:00 UTC – post-qualifying update
    - cron: "0 20 * * 0"   # Sunday  20:00 UTC – post-race results
    - cron: "0 06 * * 1"   # Monday  06:00 UTC – post-race retry window
  workflow_dispatch:
    inputs:
      round:
        description: "Round number (1-24), or 'next' for upcoming round"
        required: true
        default: "next"
      phase:
        description: "GP weekend phase"
        type: choice
        options:
          - auto
          - pre
          - post-quali
          - post-race
          - full
        default: "auto"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine round and phase
        id: config
        run: |
          # ── Detect round ──
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.round }}" = "next" ]; then
            ROUND=$(python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          from datetime import datetime
          from f1_prediction_utils import CALENDAR_2026
          now = datetime.utcnow()
          for rnd, info in sorted(CALENDAR_2026.items()):
              race_date = datetime.strptime(info['date'], '%Y-%m-%d')
              if abs((race_date - now).days) <= 3:
                  print(rnd); sys.exit(0)
          for rnd, info in sorted(CALENDAR_2026.items()):
              race_date = datetime.strptime(info['date'], '%Y-%m-%d')
              if race_date >= now:
                  print(rnd); sys.exit(0)
          print(1)
          ")
          else
            ROUND="${{ github.event.inputs.round }}"
          fi
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"

          # ── Detect phase ──
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DOW=$(date -u +%u)  # 1=Mon … 7=Sun
            case $DOW in
              1) PHASE="post-race" ;;
              5) PHASE="pre" ;;
              6) PHASE="post-quali" ;;
              7) PHASE="post-race" ;;
              *) PHASE="pre" ;;
            esac
          else
            PHASE="${{ github.event.inputs.phase }}"
            PHASE="${PHASE:-auto}"
          fi
          echo "phase=$PHASE" >> "$GITHUB_OUTPUT"

          echo "Round: $ROUND  |  Phase: $PHASE"

      - name: Check if it's a race weekend
        id: check
        if: github.event_name == 'schedule'
        run: |
          IS_RACE_WEEKEND=$(python3 -c "
          import sys, os
          sys.path.insert(0, '.')
          from datetime import datetime
          from f1_prediction_utils import CALENDAR_2026
          now = datetime.utcnow()
          for rnd, info in sorted(CALENDAR_2026.items()):
              race_date = datetime.strptime(info['date'], '%Y-%m-%d')
              if abs((race_date - now).days) <= 3:
                  print('true'); sys.exit(0)
          print('false')
          ")
          echo "is_race_weekend=$IS_RACE_WEEKEND" >> "$GITHUB_OUTPUT"
          if [ "$IS_RACE_WEEKEND" = "false" ]; then
            echo "⏭️  Not a race weekend — skipping."
          fi

      - name: Run GP weekend pipeline
        if: github.event_name != 'schedule' || steps.check.outputs.is_race_weekend == 'true'
        run: |
          ROUND="${{ steps.config.outputs.round }}"
          PHASE="${{ steps.config.outputs.phase }}"

          if [ "$PHASE" = "full" ]; then
            python gp_weekend.py --round "$ROUND" --full --no-build
          elif [ "$PHASE" = "auto" ]; then
            python gp_weekend.py --round "$ROUND" --no-build
          else
            python gp_weekend.py --round "$ROUND" --phase "$PHASE" --no-build
          fi

      - name: Commit updated data
        if: github.event_name != 'schedule' || steps.check.outputs.is_race_weekend == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f website/public/data/ website/public/visualizations/ \
                     predicted_results_2026.json
          git add races/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            ROUND="${{ steps.config.outputs.round }}"
            PHASE="${{ steps.config.outputs.phase }}"
            git commit -m "[$PHASE] Update round $ROUND ($(date -u +%Y-%m-%d))"
            git push origin HEAD:main
          fi

  deploy:
    needs: predict
    uses: ./.github/workflows/deploy.yml
